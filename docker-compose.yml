# local-ai-ui — نشر خلف Traefik على Docker Desktop (Windows)
#
# طريقتان للنشر:
#
# 1) عبر Portainer (Build from Git + Webhook — موصى به):
#    Stacks → Add stack → Build method: Repository
#      Repository URL: <رابط GitHub العام>
#      Reference: refs/heads/main
#      Compose path: docker-compose.yml
#    فعّل Automatic updates → Webhook، وانسخ الرابط إلى:
#    GitHub → Settings → Webhooks → Add webhook (Just the push event).
#    عيّن Environment variables أدناه ثم Deploy.
#    أي push من Lovable → GitHub سيُعيد البناء والنشر تلقائياً.
#
# 2) عبر سطر الأوامر:
#    docker compose build
#    docker compose up -d
#
# متطلبات:
#   - شبكة Traefik موجودة:   docker network create traefik-net
#   - تفعيل CORS في Ollama على Windows:  setx OLLAMA_ORIGINS "*"  (ثم أعد التشغيل)

services:
  local-ai-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # افتراضيًا نستخدم بروكسي nginx الداخلي (same-origin) لتجنّب CORS.
        # يمكن تجاوز هذه القيم لاحقاً من صفحة /settings داخل التطبيق.
        VITE_OLLAMA_URL: ${VITE_OLLAMA_URL:-/proxy/ollama}
        VITE_N8N_URL: ${VITE_N8N_URL:-/proxy/n8n}
        VITE_N8N_WEBHOOK_BASE: ${VITE_N8N_WEBHOOK_BASE:-/proxy/n8n/webhook}
        VITE_N8N_API_KEY: ${VITE_N8N_API_KEY:-}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-/proxy/supabase}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    image: local-ai-ui:latest
    pull_policy: build
    container_name: local-ai-ui
    restart: unless-stopped
    # للوصول إلى Ollama المثبَّت على ويندوز عبر host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.localhost`)"
      - "traefik.http.routers.ai.entrypoints=web"
      - "traefik.http.services.ai.loadbalancer.server.port=8080"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
