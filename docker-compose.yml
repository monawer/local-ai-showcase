# local-ai-ui — نشر خلف Traefik على Docker Desktop (Windows)
#
# قبل التشغيل:
#   1) ابنِ الصورة:  docker build -t local-ai-ui:1.0.0 .
#      (أو على جهاز فيه إنترنت ثم: docker save + استيراد عبر Portainer)
#   2) تأكد من وجود شبكة Traefik الخارجية:
#        docker network create traefik-net   # إذا لم تكن موجودة
#   3) تأكد من تفعيل CORS في Ollama على Windows:
#        setx OLLAMA_ORIGINS "*"            (ثم أعد تشغيل Ollama)

services:
  local-ai-ui:
    image: local-ai-ui:1.0.0
    container_name: local-ai-ui
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.localhost`)"
      - "traefik.http.routers.ai.entrypoints=web"
      - "traefik.http.services.ai.loadbalancer.server.port=8080"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
