server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ضغط
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             image/svg+xml;

  # تخزين مؤقت طويل للأصول المُهَشَّشَة (Vite يضيف hash للأسماء)
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ---------- بروكسي إلى الخدمات (same-origin لتجنّب CORS) ----------
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Ollama يعمل على مضيف ويندوز
  location /proxy/ollama/ {
    proxy_pass http://host.docker.internal:11434/;
    proxy_set_header Host localhost:11434;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  # n8n عبر Traefik على مضيف Docker Desktop مع Host header الصحيح
  location /proxy/n8n/ {
    proxy_pass http://host.docker.internal/;
    proxy_set_header Host n8n.localhost;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 600s;
  }

  # Supabase Kong
  location /proxy/supabase/ {
    proxy_pass http://host.docker.internal/;
    proxy_set_header Host supabase.localhost;
    proxy_http_version 1.1;
    proxy_read_timeout 600s;
  }

  # OpenWebUI
  location /proxy/webui/ {
    proxy_pass http://host.docker.internal/;
    proxy_set_header Host webui.localhost;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 600s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # عدم تخزين index.html
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
